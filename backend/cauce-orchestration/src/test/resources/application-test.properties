# Integration-test configuration. Datasource provided by Testcontainers
# via @ServiceConnection.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Surface the RlsContextAspect debug log that confirms set_config runs.
logging.level.dev.cauce=DEBUG

# Disable the async worker and reaper for module-wide ITs. The worker/reaper-specific IT
# re-enables them via @TestPropertySource and drives the polling/reaping manually so
# tests stay deterministic and do not race the @Scheduled triggers.
cauce.orchestration.worker.enabled=false
cauce.orchestration.worker.reaper.enabled=false

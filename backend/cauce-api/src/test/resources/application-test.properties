# Integration-test configuration for cauce-api. Datasource provided by Testcontainers
# via @ServiceConnection.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Async worker disabled in API tests; only the security filter is exercised here.
cauce.orchestration.worker.enabled=false
cauce.orchestration.worker.reaper.enabled=false

# Surface the RlsContextAspect and filter debug logs.
logging.level.dev.cauce=DEBUG

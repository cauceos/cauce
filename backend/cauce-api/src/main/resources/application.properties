# Common configuration shared by all profiles. No secrets here.
spring.application.name=cauce

# Default profile in the repository is local development. Override elsewhere
# with SPRING_PROFILES_ACTIVE (e.g. "prod").
spring.profiles.active=dev

# Disable open-in-view (anti-pattern); transactions belong in service layer.
spring.jpa.open-in-view=false

# API JSON convention: snake_case for all property names (e.g. parent_tenant_id,
# model_provider, created_at). Applied globally here rather than with per-field
# @JsonProperty annotations. Explicit @JsonProperty (e.g. on ErrorResponse) still wins.
spring.jackson.property-naming-strategy=SNAKE_CASE

# --- Observability (minimal, dependency-free for now) ---
# Actuator surface. Full OpenTelemetry export lands in cauce-observability later.
management.endpoints.web.exposure.include=health,info

# Correlation-ready log pattern. requestId is populated per request by RequestIdFilter;
# traceId/spanId stay empty until tracing is wired in cauce-observability. The :- default
# keeps every placeholder an inert no-op when its MDC value is absent.
logging.pattern.correlation=[${spring.application.name:},%X{requestId:-},%X{traceId:-},%X{spanId:-}]

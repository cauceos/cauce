# Production profile. All values come from the environment; nothing hardcoded.
# Activate with SPRING_PROFILES_ACTIVE=prod.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate

# Do not expose internal health details publicly.
management.endpoint.health.show-details=never

# Structured (ECS JSON) console logs for aggregation. Native to Spring Boot 3.4+.
logging.structured.format.console=ecs

logging.level.dev.cauce=INFO

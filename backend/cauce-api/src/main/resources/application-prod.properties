# Production profile. All values come from the environment; nothing hardcoded.
# Activate with SPRING_PROFILES_ACTIVE=prod.

# Runtime application connection: the least-privilege cauce_app role (subject to RLS).
# DATABASE_* must therefore be the cauce_app credentials.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Privileged owner connection for Flyway migrations and operator bootstrap (both bypass RLS).
# ADMIN_DATABASE_URL defaults to DATABASE_URL (same database, different role). The cauce_app
# role must be provisioned and granted (migration V10) before first start (ops runbook).
cauce.admin.datasource.url=${ADMIN_DATABASE_URL:${DATABASE_URL}}
cauce.admin.datasource.username=${ADMIN_DATABASE_USERNAME}
cauce.admin.datasource.password=${ADMIN_DATABASE_PASSWORD}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate

# The async worker and reaper run by default; their cross-tenant claim/reap go through the
# V12 SECURITY DEFINER functions, safe under the least-privilege cauce_app role (ADR 0001).

# Do not expose internal health details publicly.
management.endpoint.health.show-details=never

# Structured (ECS JSON) console logs for aggregation. Native to Spring Boot 3.4+.
logging.structured.format.console=ecs

logging.level.dev.cauce=INFO

# Anthropic LLM provider requires ANTHROPIC_API_KEY in the environment to be registered.

# Local development profile. Talks to the Docker Compose stack on localhost.
# Credentials match docker-compose.yml defaults (insecure, dev only).

# PostgreSQL (host port 5433 -> container 5432).
#
# The application connects as the least-privilege cauce_app role so Row-Level Security is
# enforced at runtime. That role is created by docker/postgres/init/02-cauce-app-role.sql,
# which only runs on a fresh volume: run `docker compose down -v && docker compose up -d`
# after pulling this change.
spring.datasource.url=jdbc:postgresql://localhost:5433/cauce_dev
spring.datasource.username=cauce_app
spring.datasource.password=cauce_app_dev

# Privileged owner connection, used only by Flyway and the operator bootstrap (both must
# bypass RLS). 'cauce' owns the schema, so it is exempt (tables are ENABLE, not FORCE RLS).
cauce.admin.datasource.url=jdbc:postgresql://localhost:5433/cauce_dev
cauce.admin.datasource.username=cauce
cauce.admin.datasource.password=cauce_dev

# Redis.
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway (running as the owner via cauce.admin.datasource) owns the schema; Hibernate only
# validates the entity mappings against it.
spring.jpa.hibernate.ddl-auto=validate

# The async worker and reaper run by default. Their cross-tenant claim/reap go through the
# V12 SECURITY DEFINER functions (claim_pending_invocations / orphaned_invocations), so they
# are safe under the least-privilege cauce_app role; all processing stays under RLS in the
# claimed tenant's context. See ADR 0001.

# Show component details so /actuator/health lists db and redis status.
management.endpoint.health.show-details=always

logging.level.dev.cauce=DEBUG

# Anthropic LLM provider (cauce-llm-anthropic). Set the ANTHROPIC_API_KEY env var to
# enable it; without it the app starts normally but the provider is not registered.

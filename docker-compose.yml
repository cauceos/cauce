# Local development stack for Cauce: PostgreSQL (with pgvector), Redis, Adminer.
#
# NOT for production. The default credentials below are intentionally insecure
# and exist only to make local onboarding frictionless.
#
# Usage (from the repo root):
#   docker compose up -d      # start
#   docker compose ps         # check health
#   docker compose down       # stop, keep data
#   docker compose down -v    # stop and wipe volumes
name: cauce

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cauce-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cauce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cauce_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cauce_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - cauce_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cauce} -d ${POSTGRES_DB:-cauce_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cauce-net

  redis:
    image: redis:7-alpine
    container_name: cauce-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cauce_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cauce-net

  adminer:
    image: adminer:4-standalone
    container_name: cauce-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cauce-net

volumes:
  cauce_pgdata:
    name: cauce_pgdata
  cauce_redisdata:
    name: cauce_redisdata

networks:
  cauce-net:
    name: cauce-net
    driver: bridge

version: 2

updates:
  # GitHub Actions used by workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Backend Gradle build (settings.gradle.kts lives in /backend).
  - package-ecosystem: gradle
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)

  # Frontend npm. Inert until frontend/package.json exists; kept here so the
  # config is ready the moment the Angular app lands.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
